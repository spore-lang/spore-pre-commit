name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  guardrails:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check mirrored metadata invariants
        run: python check_invariants.py

      - name: Smoke install
        run: python -m pip install .
