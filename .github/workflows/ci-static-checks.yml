name: "CI - Static Checks"

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-static-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prek:
    name: prek
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: j178/prek-action@v2
